name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: semfs
            features: "--features semfs-cli/fuse"
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: semfs
            features: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: semfs
            features: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: semfs.exe
            features: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install FUSE (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev fuse3

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p semfs-cli ${{ matrix.features }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../semfs-${{ matrix.target }}.tar.gz ${{ matrix.binary }}

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: semfs-${{ matrix.target }}.tar.gz
